<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase User Admin Dashboard</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-emerald-400">User Management Dashboard</h1>
                <p class="text-sm text-gray-400">Total Users Real-time Database Controller</p>
            </div>
            <button onclick="fetchUsers()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-medium transition cursor-pointer">
                🔄 Refresh Data
            </button>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage" class="hidden mb-4 p-3 rounded-lg text-center font-medium"></div>

        <!-- Loading Spinner -->
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-500 mx-auto"></div>
            <p class="text-gray-400 mt-2">Loading users from Supabase...</p>
        </div>

        <!-- Main User Table -->
        <div id="tableContainer" class="hidden bg-gray-800 rounded-xl shadow-xl overflow-x-auto border border-gray-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-750 border-b border-gray-700 text-gray-300 text-sm">
                        <th class="p-4">ID / Slot</th>
                        <th class="p-4">User Details</th>
                        <th class="p-4">Identity</th>
                        <th class="p-4">Financials (Balance/Loan)</th>
                        <th class="p-4">Status Permissions</th>
                        <th class="p-4 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody" class="divide-y divide-gray-700 text-sm">
                    <!-- Dynamic Data Will Insert Here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 border border-gray-700 rounded-xl max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold text-emerald-400 mb-4 border-b border-gray-700 pb-2">Edit User Details</h2>
            <form id="editForm" onsubmit="saveUserChanges(event)">
                <input type="hidden" id="edit_id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Full Name</label>
                        <input type="text" id="edit_full_name" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Email (Unique)</label>
                        <input type="email" id="edit_email" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">ID Name (Document)</label>
                        <input type="text" id="edit_id_name" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">ID Number</label>
                        <input type="text" id="edit_id_number" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Account Balance ($)</label>
                        <input type="number" step="0.01" id="edit_balance" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Loan Amount ($)</label>
                        <input type="number" step="0.01" id="edit_loan_amount" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Loan Status</label>
                        <select id="edit_loan_status" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:border-emerald-500 outline-none">
                            <option value="none">None</option>
                            <option value="pending">Pending</option>
                            <option value="approved">Approved</option>
                            <option value="paid">Paid</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Password (Plain Text)</label>
                        <input type="text" id="edit_password" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:border-emerald-500 outline-none">
                    </div>
                </div>

                <div class="mt-4 grid grid-cols-2 gap-4 bg-gray-900 p-3 rounded-lg border border-gray-700">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="edit_verified" class="w-4 h-4 text-emerald-600 rounded">
                        <span class="text-sm font-medium text-gray-300">Verified Account</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="edit_frozen" class="w-4 h-4 text-red-600 rounded">
                        <span class="text-sm font-medium text-red-400">Freeze Account</span>
                    </label>
                </div>

                <div class="flex justify-end space-x-3 mt-6 border-t border-gray-700 pt-4">
                    <button type="button" onclick="closeModal()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg cursor-pointer">Cancel</button>
                    <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-medium cursor-pointer">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript Controller Logic -->
    <script>
        // Supabase Initialization using your provided credentials
        const SUPABASE_URL = "https://wyszjxixjgasxkouckkl.supabase.co"; 
        const SUPABASE_KEY = "sb_secret_KzhlfxRRR5Iq9P_fHW4esA_fOxVYw6Q"; // Using Secret role key to bypass RLS limits for admin
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let localUsersArray = [];

        // Fetch All Users from Database
        async function fetchUsers() {
            showLoading(true);
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;
                localUsersArray = data;
                renderTable(data);
            } catch (error) {
                showStatus("Error fetching users: " + error.message, "bg-red-500");
            } finally {
                showLoading(false);
            }
        }

        // Render Table Rows Dynamically
        function renderTable(users) {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = "";

            if(users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-gray-500">No users found in database.</td></tr>`;
                return;
            }

            users.forEach(user => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-750 transition";
                
                tr.innerHTML = `
                    <td class="p-4 font-mono">
                        <span class="text-gray-500">ID:</span> ${user.id}<br>
                        <span class="text-emerald-400 font-semibold">Slot:</span> ${user.slot || 'None'}
                    </td>
                    <td class="p-4">
                        <div class="font-bold text-white">${user.full_name || 'N/A'}</div>
                        <div class="text-xs text-gray-400">${user.email}</div>
                        <div class="text-xs text-amber-500 font-mono mt-1">Pass: ${user.password}</div>
                    </td>
                    <td class="p-4 text-xs">
                        <span class="text-gray-400">Doc:</span> ${user.id_name || 'N/A'}<br>
                        <span class="text-gray-400">Num:</span> ${user.id_number || 'N/A'}
                    </td>
                    <td class="p-4">
                        <div class="text-emerald-400 font-medium">Bal: $${parseFloat(user.balance).toFixed(2)}</div>
                        <div class="text-xs text-gray-400">Loan: $${parseFloat(user.loan_amount).toFixed(2)} 
                            <span class="px-1.5 py-0.5 rounded text-[10px] uppercase font-bold ${getLoanBadgeClass(user.loan_status)}">${user.loan_status}</span>
                        </div>
                    </td>
                    <td class="p-4 space-y-1">
                        <div>
                            <span class="px-2 py-0.5 rounded text-xs font-bold ${user.verified ? 'bg-emerald-950 text-emerald-400 border border-emerald-800' : 'bg-gray-700 text-gray-400'}">
                                ${user.verified ? '✓ Verified' : 'Unverified'}
                            </span>
                        </div>
                        <div>
                            <span class="px-2 py-0.5 rounded text-xs font-bold ${user.frozen ? 'bg-red-950 text-red-400 border border-red-900 animate-pulse' : 'bg-gray-700 text-gray-400'}">
                                ${user.frozen ? '🛑 Frozen' : 'Active'}
                            </span>
                        </div>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="openEditModal(${user.id})" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-1.5 rounded font-medium transition cursor-pointer">
                            ✏️ Edit/Update
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Open Modal and Populate Inputs
        function openEditModal(userId) {
            const user = localUsersArray.find(u => u.id === userId);
            if (!user) return;

            document.getElementById('edit_id').value = user.id;
            document.getElementById('edit_full_name').value = user.full_name || '';
            document.getElementById('edit_email').value = user.email;
            document.getElementById('edit_id_name').value = user.id_name || '';
            document.getElementById('edit_id_number').value = user.id_number || '';
            document.getElementById('edit_balance').value = user.balance;
            document.getElementById('edit_loan_amount').value = user.loan_amount;
            document.getElementById('edit_loan_status').value = user.loan_status;
            document.getElementById('edit_password').value = user.password;
            document.getElementById('edit_verified').checked = user.verified;
            document.getElementById('edit_frozen').checked = user.frozen;

            document.getElementById('editModal').classList.remove('hidden');
        }

        // Save Form Data to Supabase Realtime
        async function saveUserChanges(e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            
            const updatedData = {
                full_name: document.getElementById('edit_full_name').value,
                email: document.getElementById('edit_email').value,
                id_name: document.getElementById('edit_id_name').value,
                id_number: document.getElementById('edit_id_number').value,
                balance: parseFloat(document.getElementById('edit_balance').value) || 0,
                loan_amount: parseFloat(document.getElementById('edit_loan_amount').value) || 0,
                loan_status: document.getElementById('edit_loan_status').value,
                password: document.getElementById('edit_password').value,
                verified: document.getElementById('edit_verified').checked,
                frozen: document.getElementById('edit_frozen').checked,
                updated_at: new Date().toISOString()
            };

            try {
                const { error } = await supabase
                    .from('users')
                    .update(updatedData)
                    .eq('id', id);

                if (error) throw error;
                
                showStatus("User updated successfully!", "bg-emerald-600");
                closeModal();
                fetchUsers(); // Refresh Data View
            } catch (error) {
                showStatus("Update Failed: " + error.message, "bg-red-500");
            }
        }

        // Helpers
        function closeModal() {
            document.getElementById('editModal').classAdd('hidden');
        }
        function showLoading(status) {
            document.getElementById('loading').classList.toggle('hidden', !status);
            document.getElementById('tableContainer').classList.toggle('hidden', status);
        }
        function showStatus(msg, bgClass) {
            const el = document.getElementById('statusMessage');
            el.innerText = msg;
            el.className = `p-3 rounded-lg text-center font-medium text-white ${bgClass}`;
            setTimeout(() => el.className = "hidden", 4000);
        }
        function getLoanBadgeClass(status) {
            if(status === 'none') return 'bg-gray-900 text-gray-400';
            if(status === 'pending') return 'bg-amber-950 text-amber-400 border border-amber-900';
            if(status === 'approved') return 'bg-blue-950 text-blue-400 border border-blue-900';
            return 'bg-purple-950 text-purple-400 border border-purple-900';
        }

        // Auto Load on Page Boot
        window.onload = fetchUsers;
    </script>
</body>
</html>
